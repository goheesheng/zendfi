    - generic [ref=e146]:
      - generic [ref=e147]:
        - heading "Frequently asked questions" [level=2] [ref=e148]
        - paragraph [ref=e149]: Everything you need to know about liquidation-free borrowing
      - generic [ref=e150]:
        - generic [ref=e151]:
          - button "How is liquidation-free borrowing possible?" [ref=e152]:
            - generic [ref=e153]: How is liquidation-free borrowing possible?
            - img [ref=e154]
          - paragraph [ref=e157]: When you deposit collateral, lenders simultaneously sell you a put option at your loan's strike price. This gives you the right — but not obligation — to sell your collateral at that price. If the market drops, you can simply walk away, keeping your loan while the lender keeps your collateral. No forced liquidations, ever.
        - generic [ref=e158]:
          - button "What happens if my collateral value drops?" [ref=e159]:
            - generic [ref=e160]: What happens if my collateral value drops?
            - img [ref=e161]
          - paragraph [ref=e163]: Nothing happens to your position. Unlike traditional lending where a price drop triggers liquidation, Zend's options-based structure means you're protected. You can choose to repay and reclaim your collateral, or walk away if it's worth less than your loan.
        - generic [ref=e164]:
          - button "What collateral types are supported?" [ref=e165]:
            - generic [ref=e166]: What collateral types are supported?
            - img [ref=e167]
          - paragraph [ref=e169]: Zend currently supports ETH and BTC as collateral. We're working on expanding to additional assets based on liquidity and demand.
        - generic [ref=e170]:
          - button "How are loan terms determined?" [ref=e171]:
            - generic [ref=e172]: How are loan terms determined?
            - img [ref=e173]
          - paragraph [ref=e175]: You specify your desired loan amount and term, then lenders compete to offer you rates through our RFQ (Request for Quote) system. You choose the best offer — no negotiation required.
        - generic [ref=e176]:
          - button "Is Zend non-custodial?" [ref=e177]:
            - generic [ref=e178]: Is Zend non-custodial?
            - img [ref=e179]
          - paragraph [ref=e181]: Yes. Your collateral is held in smart contracts, not by Zend. You maintain full control and can interact directly with the protocol.
        - generic [ref=e182]:
          - button "What blockchain is Zend built on?" [ref=e183]:
            - generic [ref=e184]: What blockchain is Zend built on?
            - img [ref=e185]
          - paragraph [ref=e187]: Zend is built on Thetanuts V4 RFQ infrastructure, leveraging enterprise-grade options mechanics with anti-front-running protection.
